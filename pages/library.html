<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المكتبة القانونية — ياسر قطب</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/main.css">
</head>
<body>

<nav class="topnav">
  <div class="logo" onclick="window.location='../index.html'">
    <div class="logo-icon">ق</div>
    <div>
      <div class="logo-text">ياسر قطب للمؤلفات القانونية</div>
      <div class="logo-sub">المكتبة القانونية الرقمية</div>
    </div>
  </div>
  <div class="nav-btns" id="navBtns"></div>
</nav>

<div class="lib-wrap">
  <div class="lib-top">
    <h2>المكتبة القانونية الرقمية</h2>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="ابحث عن مؤلف قانوني..." oninput="filterDocs()">
      <select id="catFilter" onchange="filterDocs()">
        <option value="">جميع التصنيفات</option>
        <option>قانون مدني</option>
        <option>قانون جنائي</option>
        <option>قانون تجاري</option>
        <option>قانون دستوري</option>
        <option>قانون دولي</option>
        <option>قانون إداري</option>
        <option>قانون العمل</option>
      </select>
    </div>
  </div>

  <div class="cat-filters">
    <button class="cat-btn active" onclick="setCat(this,'')">الكل</button>
    <button class="cat-btn" onclick="setCat(this,'قانون مدني')">قانون مدني</button>
    <button class="cat-btn" onclick="setCat(this,'قانون جنائي')">قانون جنائي</button>
    <button class="cat-btn" onclick="setCat(this,'قانون تجاري')">قانون تجاري</button>
    <button class="cat-btn" onclick="setCat(this,'قانون دستوري')">قانون دستوري</button>
    <button class="cat-btn" onclick="setCat(this,'قانون دولي')">قانون دولي</button>
    <button class="cat-btn" onclick="setCat(this,'قانون إداري')">قانون إداري</button>
    <button class="cat-btn" onclick="setCat(this,'قانون العمل')">قانون العمل</button>
  </div>

  <div class="docs-grid" id="docsGrid"></div>
</div>

<script src="../js/data.js"></script>
<script src="../js/auth.js"></script>
<script>
renderNav();

function renderLibrary() {
  const docs   = getDocs();
  const grid   = document.getElementById('docsGrid');
  const search = document.getElementById('searchInput').value.toLowerCase();
  const cat    = document.getElementById('catFilter').value;

  const filtered = docs.filter(d => {
    const ms = !search || d.title.includes(search) || d.content.toLowerCase().includes(search) || d.author.includes(search);
    const mc = !cat || d.cat === cat;
    return ms && mc;
  });

  if (!filtered.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text3);font-family:\'Amiri\',serif;font-size:18px">لا توجد نتائج مطابقة للبحث</div>';
    return;
  }

  grid.innerHTML = filtered.map(d => `
    <a class="doc-card" href="docview.html?id=${d.id}">
      <span class="doc-cat">${d.cat}</span>
      <div class="doc-title">${d.title}</div>
      <div class="doc-excerpt">${d.content.substring(0, 180)}...</div>
      <div class="doc-meta-r">
        <span>📅 ${d.year} · ${d.author}</span>
        <span>👁 ${d.views.toLocaleString('ar-EG')}</span>
      </div>
    </a>`).join('');
}

function filterDocs() { renderLibrary(); }

function setCat(el, cat) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('catFilter').value = cat;
  renderLibrary();
}

renderLibrary();
</script>
</body>
</html>
