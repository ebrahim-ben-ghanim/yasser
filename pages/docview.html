<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عرض القانون — ياسر قطب</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/main.css">
<style>
/* ===== TAB SYSTEM ===== */
.doc-tab-bar {
  display: flex;
  gap: 0;
  background: var(--cream);
  border-radius: 12px 12px 0 0;
  border: 1px solid var(--border);
  border-bottom: none;
  overflow: hidden;
  margin-top: 28px;
}
.doc-tab-btn {
  flex: 1;
  padding: 14px 10px;
  background: transparent;
  border: none;
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--text3);
  cursor: pointer;
  transition: all .2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  border-bottom: 3px solid transparent;
  white-space: nowrap;
}
.doc-tab-btn:hover { background: rgba(201,168,76,.08); color: var(--navy); }
.doc-tab-btn.active {
  background: #fff;
  color: var(--navy);
  border-bottom: 3px solid var(--gold);
}
.doc-tab-icon { font-size: 18px; }

/* TAB PANELS */
.tab-panel {
  display: none;
  background: #fff;
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 12px 12px;
  padding: 36px 40px;
  font-family: 'Amiri', serif;
  font-size: 18px;
  line-height: 2.2;
  color: var(--text);
  white-space: pre-wrap;
  user-select: text;
  min-height: 300px;
}
.tab-panel.active { display: block; }
.tab-panel::selection,
.tab-panel *::selection { background: rgba(201,168,76,.3); }

/* Section titles inside panels */
.panel-section-title {
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--gold);
  background: rgba(201,168,76,.08);
  border: 1px solid rgba(201,168,76,.25);
  display: inline-block;
  padding: 4px 14px;
  border-radius: 20px;
  margin-bottom: 20px;
}

/* Ruling cards */
.ruling-card {
  background: var(--offwhite);
  border: 1px solid var(--border);
  border-right: 4px solid var(--gold);
  border-radius: 8px;
  padding: 20px 24px;
  margin-bottom: 20px;
  font-size: 16px;
  line-height: 2;
  white-space: pre-wrap;
}
.ruling-num {
  font-family: 'Cairo', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 8px;
}

/* Article cards */
.article-block {
  border-bottom: 1px dashed var(--border);
  padding-bottom: 20px;
  margin-bottom: 20px;
}
.article-block:last-child { border-bottom: none; }

/* Empty state */
.tab-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
}
.tab-empty .empty-icon { font-size: 48px; margin-bottom: 12px; }
.tab-empty p { font-family: 'Cairo', sans-serif; font-size: 15px; }

/* Quota warning */
.quota-warning {
  background: #fff3cd;
  border: 1px solid #ffc107;
  border-radius: 8px;
  padding: 14px 20px;
  font-size: 13px;
  color: #856404;
  margin-bottom: 16px;
  display: none;
  font-family: 'Cairo', sans-serif;
}
.quota-warning a { color: var(--navy); font-weight: 700; }

/* Mobile tabs */
@media (max-width: 600px) {
  .doc-tab-btn { font-size: 12px; padding: 12px 6px; gap: 4px; }
  .doc-tab-icon { font-size: 16px; }
  .tab-panel { padding: 20px 16px; font-size: 16px; line-height: 2; }
  .ruling-card { padding: 14px 16px; font-size: 14px; }
}
</style>
</head>
<body>

<nav class="topnav">
  <div class="logo" onclick="window.location='../index.html'">
    <div class="logo-icon">ق</div>
    <div>
      <div class="logo-text">ياسر قطب للمؤلفات القانونية</div>
      <div class="logo-sub">المكتبة القانونية الرقمية</div>
    </div>
  </div>
  <div class="nav-btns" id="navBtns"></div>
  <button class="hamburger" id="hamburgerBtn" onclick="toggleMobileMenu()">
    <span></span><span></span><span></span>
  </button>
</nav>
<div class="mobile-menu hidden" id="mobileMenu"></div>

<div class="doc-view">
  <a class="back-btn" href="library.html">← العودة للمكتبة</a>

  <!-- Doc header -->
  <div class="doc-view-header">
    <div class="doc-cat" id="viewCat" style="margin-bottom:10px"></div>
    <h1 id="viewTitle"></h1>
    <div style="display:flex;gap:20px;font-size:13px;color:var(--text3);flex-wrap:wrap;margin-top:8px">
      <span id="viewAuthor"></span>
      <span id="viewYear"></span>
      <span id="viewViews"></span>
    </div>
  </div>

  <!-- Quota warning -->
  <div class="quota-warning" id="quotaWarning">
    ⚠️ لقد استنفدت حصتك اليومية من النسخ (٥٠٠ كلمة). يتجدد الحد تلقائياً خلال ٢٤ ساعة.
    <a href="subscription.html">ترقية للاحترافي ←</a>
  </div>

  <!-- 3-TAB BAR -->
  <div class="doc-tab-bar">
    <button class="doc-tab-btn active" id="tab-articles" onclick="switchTab('articles')">
      <span class="doc-tab-icon">📄</span>
      <span>نصوص المواد</span>
    </button>
    <button class="doc-tab-btn" id="tab-fiqh" onclick="switchTab('fiqh')">
      <span class="doc-tab-icon">📚</span>
      <span>شرح الفقه</span>
    </button>
    <button class="doc-tab-btn" id="tab-rulings" onclick="switchTab('rulings')">
      <span class="doc-tab-icon">⚖️</span>
      <span>أحكام النقض</span>
    </button>
  </div>

  <!-- Panel 1: Articles -->
  <div class="tab-panel active" id="panel-articles" onmouseup="handleCopy(event)">
    <div id="articlesContent"></div>
  </div>

  <!-- Panel 2: Fiqh -->
  <div class="tab-panel" id="panel-fiqh" onmouseup="handleCopy(event)">
    <div id="fiqhContent"></div>
  </div>

  <!-- Panel 3: Rulings -->
  <div class="tab-panel" id="panel-rulings" onmouseup="handleCopy(event)">
    <div id="rulingsContent"></div>
  </div>

</div>

<div class="copy-notice" id="copyNotice"></div>

<script src="../js/data.js"></script>
<script src="../js/auth.js"></script>
<script>
renderNav();
renderMobileMenu();

// ── Load document ──────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const docId  = parseInt(params.get('id'));
const docs   = getDocs();
const doc    = docs.find(d => d.id === docId);

if (!doc) {
  document.querySelector('.doc-view').innerHTML =
    '<div style="text-align:center;padding:80px 20px;font-family:\'Amiri\',serif;font-size:20px;color:var(--text2)">' +
    'الوثيقة غير موجودة<br><a href="library.html" style="color:var(--gold);font-family:Cairo,sans-serif;font-size:15px">← العودة للمكتبة</a></div>';
} else {
  // increment views
  doc.views = (doc.views || 0) + 1;
  saveDocs(docs);

  document.title = doc.title + ' — ياسر قطب';
  document.getElementById('viewCat').textContent    = doc.cat;
  document.getElementById('viewTitle').textContent  = doc.title;
  document.getElementById('viewAuthor').textContent = '✍️ ' + (doc.author || '');
  document.getElementById('viewYear').textContent   = '📅 ' + (doc.year || '');
  document.getElementById('viewViews').textContent  = '👁 ' + doc.views.toLocaleString('ar-EG') + ' مشاهدة';

  // ── Render articles panel ──────────────────────────
  const artEl = document.getElementById('articlesContent');
  if (doc.articles) {
    // Split by مادة markers for card display
    const parts = doc.articles.split(/(?=المادة \()/);
    artEl.innerHTML = parts.filter(p => p.trim()).map(p => `
      <div class="article-block">${escapeHtml(p.trim())}</div>`).join('');
  } else if (doc.content) {
    artEl.innerHTML = `<div class="article-block">${escapeHtml(doc.content)}</div>`;
  } else {
    artEl.innerHTML = emptyState('📄', 'لا توجد نصوص مواد مضافة لهذا القانون حتى الآن');
  }

  // ── Render fiqh panel ──────────────────────────────
  const fiqhEl = document.getElementById('fiqhContent');
  if (doc.fiqh) {
    fiqhEl.innerHTML = escapeHtml(doc.fiqh);
  } else {
    fiqhEl.innerHTML = emptyState('📚', 'لا يوجد شرح فقهي مضاف لهذا القانون حتى الآن');
  }

  // ── Render rulings panel ──────────────────────────
  const rulingsEl = document.getElementById('rulingsContent');
  if (doc.rulings) {
    const rulingParts = doc.rulings.split(/\n(?=الطعن|الحكم|القرار)/);
    if (rulingParts.length > 1) {
      rulingsEl.innerHTML = rulingParts.filter(r => r.trim()).map(r => {
        const lines = r.trim().split('\n');
        const num   = lines[0];
        const body  = lines.slice(1).join('\n').trim();
        return `<div class="ruling-card">
          <div class="ruling-num">⚖️ ${escapeHtml(num)}</div>
          <div>${escapeHtml(body)}</div>
        </div>`;
      }).join('');
    } else {
      rulingsEl.innerHTML = `<div class="ruling-card">${escapeHtml(doc.rulings)}</div>`;
    }
  } else {
    rulingsEl.innerHTML = emptyState('⚖️', 'لا توجد أحكام نقض مضافة لهذا القانون حتى الآن');
  }

  // Quota check
  const s     = getSession();
  const usage = getUsage();
  const limit = getLimit(s);
  document.getElementById('quotaWarning').style.display = (s && usage.words >= limit) ? 'block' : 'none';
}

// ── Tab switching ───────────────────────────────────────
function switchTab(name) {
  ['articles', 'fiqh', 'rulings'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === name);
    document.getElementById('panel-' + t).classList.toggle('active', t === name);
  });
}

// ── Copy tracking ───────────────────────────────────────
function handleCopy() {
  const sel = window.getSelection().toString().trim();
  if (!sel || sel.length < 2) return;
  const words = sel.split(/\s+/).length;
  const s = getSession();
  if (!s) { showCopyNotice('⚠️ يجب تسجيل الدخول لنسخ النصوص'); return; }
  const usage = getUsage();
  const limit = getLimit(s);

  if (usage.words >= limit) {
    showCopyNotice('⛔ تجاوزت الحد اليومي للنسخ!');
    document.getElementById('quotaWarning').style.display = 'block';
    try { window.getSelection().removeAllRanges(); } catch(e) {}
    return;
  }
  const remaining = limit - usage.words;
  if (words > remaining) {
    showCopyNotice(`⚠️ متبقي ${remaining} كلمة فقط من حصتك اليومية`);
    return;
  }
  usage.words += words;
  saveUsage(usage);
  showCopyNotice(`✓ تم نسخ ${words} كلمة — متبقي ${Math.max(0, limit - usage.words).toLocaleString('ar-EG')} كلمة`);
}

// ── Helpers ─────────────────────────────────────────────
function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function emptyState(icon, msg) {
  return `<div class="tab-empty"><div class="empty-icon">${icon}</div><p>${msg}</p></div>`;
}
</script>
</body>
</html>
